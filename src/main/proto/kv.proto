syntax = "proto3";

package kv;

option java_multiple_files = true;
option java_package = "vk.kvstore.proto";
option java_outer_classname = "KvApiProto";

import "google/protobuf/empty.proto";

service KvStore {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Range(RangeRequest) returns (stream RangeEntry);
  rpc Count(CountRequest) returns (CountResponse);
}

message NullableBinaryValue {
  oneof kind {
    bytes data = 1;
    google.protobuf.Empty null_value = 2;
  }
}

message PutRequest {
  string key = 1;
  NullableBinaryValue value = 2;
}

message PutResponse {}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  NullableBinaryValue value = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool deleted = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
}

message RangeEntry {
  string key = 1;
  NullableBinaryValue value = 2;
}

message CountRequest {}

message CountResponse {
  uint64 count = 1;
}
